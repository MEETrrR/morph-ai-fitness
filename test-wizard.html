<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>向导测试</title>
<style>
:root { --bg: #0f0f11; --text: #fff; --text2: #888; --panel: rgba(28,28,30,0.8); --border: rgba(255,255,255,0.1); --accent: #0a84ff; --glow: rgba(10,132,255,0.25); --green: #30d158; --orange: #ff9f0a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: sans-serif; display:flex; justify-content:center; min-height:100vh; }
.wiz { max-width:420px; width:100%; padding:1rem; display:flex; flex-direction:column; gap:1.5rem; }
.wiz-progress { display:flex; align-items:center; gap:.75rem; }
.wiz-track { flex:1; height:4px; background:rgba(128,128,128,0.15); border-radius:2px; overflow:hidden; }
.wiz-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--green)); border-radius:2px; transition:width .4s; }
.wiz-label { font-size:.75rem; font-weight:600; color:var(--text2); }
.panels { position:relative; min-height:360px; }
.panel { display:none; flex-direction:column; align-items:center; text-align:center; gap:.75rem; padding:1.5rem .5rem; animation:in .35s; }
.panel.on { display:flex; }
@keyframes in { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
.icon { font-size:3rem; width:80px;height:80px;display:flex;align-items:center;justify-content:center;background:var(--panel);border:1px solid var(--border);border-radius:24px; }
.title { font-size:1.6rem;font-weight:700; }
.desc { font-size:.85rem;color:var(--text2); }
.nav { display:flex;align-items:center;justify-content:space-between;padding:.5rem 0; }
.nav-btn { display:flex;align-items:center;gap:.35rem;padding:.65rem 1.1rem;border-radius:14px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:.85rem;font-weight:600;cursor:pointer; }
.nav-btn:disabled { opacity:.3;cursor:not-allowed; }
.nav-btn.primary { background:var(--accent);border-color:var(--accent);color:#fff; }
.dots { display:flex;gap:.4rem; }
.dot { width:8px;height:8px;border-radius:50%;background:var(--border);transition:.3s; }
.dot.done { background:var(--accent); }
.dot.now { background:var(--text);width:20px;border-radius:4px; }
.cards { display:flex;gap:1rem;width:100%;max-width:280px; }
.card { flex:1;padding:1.5rem 1rem;border-radius:20px;border:2px solid var(--border);background:var(--panel);cursor:pointer;transition:.25s;display:flex;flex-direction:column;align-items:center;gap:.5rem;font-weight:600; }
.card.act { border-color:var(--accent);background:var(--glow);box-shadow:0 4px 20px var(--glow); }
.card .emoji { font-size:2rem; }
.picker { display:flex;align-items:center;gap:.75rem; }
.picker-win { width:120px;height:200px;overflow:hidden;border-radius:16px;background:var(--panel);border:1px solid var(--border);position:relative; }
.picker-overlay { position:absolute; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:2;
  background:linear-gradient(to bottom, var(--panel) 0%, transparent 30%, transparent 70%, var(--panel) 100%); }
.picker-list { padding:76px 0; }
.pi { height:48px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--text2);cursor:pointer;user-select:none;transition:all .15s; }
.pi.sel { font-size:1.4rem;font-weight:700;color:var(--text); }
.picker-unit { font-size:1rem;font-weight:600;color:var(--text2); }
.hint { font-size:.7rem;color:var(--text2);opacity:.6; }
.btn-skip { background:transparent;border:1px dashed var(--border);color:var(--text2);padding:.6rem 1rem;border-radius:12px;cursor:pointer;font-size:.8rem; }
.btn-skip:hover { border-color:var(--text2);color:var(--text); }
.summary { width:100%;max-width:300px;background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:1.25rem;font-size:.85rem;line-height:1.8;text-align:left; }
.summary b { color:var(--accent); }
.btn-start { background:linear-gradient(180deg,var(--accent),#0056b3);border:none;color:#fff;padding:1rem 2rem;border-radius:16px;font-size:1rem;font-weight:600;cursor:pointer;width:100%;max-width:300px; }
</style>
</head>
<body>
<div class="wiz">
  <div class="wiz-progress"><div class="wiz-track"><div class="wiz-fill" id="fill"></div></div><span class="wiz-label" id="label">1/9</span></div>
  <div class="panels" id="panels">
    <div class="panel on" data-step="0"><div class="icon">👤</div><h2 class="title">你是？</h2><p class="desc">教练需要知道你的生理基准</p><div class="cards"><div class="card act" data-g="male"><span class="emoji">👨</span><span>男生</span></div><div class="card" data-g="female"><span class="emoji">👩</span><span>女生</span></div></div></div>
    <div class="panel" data-step="1"><div class="icon">🎂</div><h2 class="title">年龄</h2><p class="desc">上下滑动选择</p><div class="picker" id="picker1"><div class="picker-win"><div class="picker-overlay"></div><div class="picker-list" id="list1"></div></div><span class="picker-unit">岁</span></div><p class="hint">上下滑动选择</p></div>
    <div class="panel" data-step="2"><div class="icon">📏</div><h2 class="title">身高</h2><div class="picker" id="picker2"><div class="picker-win"><div class="picker-overlay"></div><div class="picker-list" id="list2"></div></div><span class="picker-unit">cm</span></div></div>
    <div class="panel" data-step="3"><div class="icon">⚖️</div><h2 class="title">当前体重</h2><div class="picker" id="picker3"><div class="picker-win"><div class="picker-overlay"></div><div class="picker-list" id="list3"></div></div><span class="picker-unit">kg</span></div></div>
    <div class="panel" data-step="4"><div class="icon">🎯</div><h2 class="title">目标体重</h2><div class="picker" id="picker4"><div class="picker-win"><div class="picker-overlay"></div><div class="picker-list" id="list4"></div></div><span class="picker-unit">kg</span></div></div>
    <div class="panel" data-step="5"><div class="icon">⚡</div><h2 class="title">核心目标</h2><p class="desc">减脂还是增肌？</p><div class="cards"><div class="card act" data-goal="fat_loss"><span class="emoji">🔥</span><span>减脂</span></div><div class="card" data-goal="muscle_gain"><span class="emoji">💪</span><span>增肌</span></div></div></div>
    <div class="panel" data-step="6"><div class="icon">📅</div><h2 class="title">期望截止日期</h2><p class="desc">设定一个目标达成日</p><input type="date" id="dl" style="background:var(--panel);border:1px solid var(--border);color:var(--text);padding:.6rem;border-radius:14px;width:200px;font-size:.9rem;"><button class="btn-skip" id="skipdl">跳过 → 长期战役</button></div>
    <div class="panel" data-step="7"><div class="icon">🩺</div><h2 class="title">伤病情况</h2><p class="desc">教练需要保护你的弱点</p><input type="text" id="ill" placeholder="如：无 / 膝盖轻微积水" style="background:var(--panel);border:1px solid var(--border);color:var(--text);padding:.85rem 1.2rem;border-radius:14px;width:100%;max-width:300px;font-size:.95rem;outline:none;"><button class="btn-skip" id="skipill">跳过 → 无伤病</button></div>
    <div class="panel" data-step="8"><div style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;background:var(--green);border-radius:50%;font-size:2.5rem;color:#fff;font-weight:700;">✓</div><h2 class="title">准备就绪</h2><div class="summary" id="sum"></div><button class="btn-start" id="startBtn">激活教练指令 →</button></div>
  </div>
  <div class="nav">
    <button class="nav-btn" id="back" disabled>← 上一步</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn primary" id="next">下一步 →</button>
  </div>
</div>
<script>
let step = 0, TOTAL = 9;
let data = { gender:'male', age:21, height:175, weight:70, target:65, goal:'fat_loss', deadline:null, illness:'无' };
let currentOffset = {};

// Dots
for(let i=0;i<TOTAL;i++) { const d=document.createElement('div');d.className='dot';d.dataset.dot=i;dots.appendChild(d); }

function makePicker(listEl, min, max, stepVal, def) {
  listEl.innerHTML = '';
  const itemHeight = 48;
  // Padding items top
  for(let j=0;j<3;j++) listEl.appendChild(Object.assign(document.createElement('div'),{className:'pi'}));
  for(let v=min; v<=max; v+=stepVal) {
    const d = document.createElement('div'); d.className='pi'; d.dataset.v=v; d.textContent=Number.isInteger(v) ? v : v.toFixed(1);
    listEl.appendChild(d);
  }
  for(let j=0;j<3;j++) listEl.appendChild(Object.assign(document.createElement('div'),{className:'pi'}));
  
  const win = listEl.parentElement;
  const idx = Math.round((def-min)/stepVal);
  const offset = idx * itemHeight;
  currentOffset[listEl.id] = offset;
  listEl.style.transform = `translateY(${-offset}px)`;

  // Mouse wheel - precise one item per tick
  win.addEventListener('wheel', (e) => {
    e.preventDefault();
    const items = listEl.querySelectorAll('.pi[data-v]');
    if(items.length===0) return;
    const dir = e.deltaY > 0 ? 1 : -1;
    let cur = currentOffset[listEl.id] || 0;
    cur = Math.max(0, Math.min((items.length-1)*itemHeight, cur + dir*itemHeight));
    currentOffset[listEl.id] = cur;
    listEl.style.transform = `translateY(${-cur}px)`;
    
    // Highlight middle item
    const midIdx = Math.round(cur/itemHeight);
    listEl.querySelectorAll('.pi[data-v]').forEach((it,i)=>{ it.classList.toggle('sel', i===midIdx); });
    
    // Store value
    const sel = items[midIdx];
    if(sel && sel.dataset.v !== undefined) {
      const val = parseFloat(sel.dataset.v);
      if(listEl.id==='list1') data.age=val;
      else if(listEl.id==='list2') data.height=val;
      else if(listEl.id==='list3') data.weight=val;
      else if(listEl.id==='list4') data.target=val;
    }
  }, {passive:false});

  // Touch support
  let touchStart = 0;
  win.addEventListener('touchstart', e => { touchStart = e.touches[0].clientY; }, {passive:false});
  win.addEventListener('touchmove', e => {
    e.preventDefault();
    const diff = touchStart - e.touches[0].clientY;
    const items = listEl.querySelectorAll('.pi[data-v]');
    if(items.length===0) return;
    let cur = currentOffset[listEl.id] || 0;
    cur = Math.max(0, Math.min((items.length-1)*itemHeight, cur + diff*0.5));
    currentOffset[listEl.id] = cur;
    listEl.style.transform = `translateY(${-cur}px)`;
    touchStart = e.touches[0].clientY;
    
    const midIdx = Math.round(cur/itemHeight);
    listEl.querySelectorAll('.pi[data-v]').forEach((it,i)=>{ it.classList.toggle('sel', i===midIdx); });
    const sel = items[midIdx];
    if(sel && sel.dataset.v !== undefined) {
      const val = parseFloat(sel.dataset.v);
      if(listEl.id==='list1') data.age=val;
      else if(listEl.id==='list2') data.height=val;
      else if(listEl.id==='list3') data.weight=val;
      else if(listEl.id==='list4') data.target=val;
    }
  }, {passive:false});

  // Initial highlight
  const items = listEl.querySelectorAll('.pi[data-v]');
  if(items[idx]) items[idx].classList.add('sel');
}

document.querySelectorAll('.card').forEach(c=>{
  c.addEventListener('click', ()=>{
    const group = c.parentElement;
    group.querySelectorAll('.card').forEach(c2=>c2.classList.remove('act'));
    c.classList.add('act');
    if(c.dataset.g!==undefined) data.gender=c.dataset.g;
    if(c.dataset.goal!==undefined) data.goal=c.dataset.goal;
  });
});

function update() {
  fill.style.width = Math.round(step/(TOTAL-1)*100)+'%';
  label.textContent = `${step+1}/${TOTAL}`;
  document.querySelectorAll('.dot').forEach((d,i)=>{ d.classList.remove('done','now'); if(i<step)d.classList.add('done'); if(i===step)d.classList.add('now'); });
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('on',i===step));
  back.disabled = step===0;
  if(step>=TOTAL-1){ next.style.display='none'; back.style.display='none'; } else { next.style.display=''; back.style.display=''; }
  if(step===1) makePicker(list1,12,80,1,data.age);
  if(step===2) makePicker(list2,140,220,1,data.height);
  if(step===3) makePicker(list3,30,200,0.5,data.weight);
  if(step===4) makePicker(list4,30,200,0.5,data.target);
  if(step===8) {
    sum.innerHTML = `性别：<b>${data.gender==='male'?'男':'女'}</b><br>年龄：<b>${data.age}岁</b><br>身高：<b>${data.height}cm</b><br>体重：<b>${data.weight}kg</b><br>目标：<b>${data.target}kg</b><br>目标类型：<b>${data.goal==='fat_loss'?'减脂':'增肌'}</b>`;
  }
}

next.addEventListener('click', ()=>{ step++; update(); });
back.addEventListener('click', ()=>{ step--; update(); });
skipdl.addEventListener('click', ()=>{ data.deadline=null; step++; update(); });
skipill.addEventListener('click', ()=>{ data.illness='无'; step++; update(); });
startBtn.addEventListener('click', ()=>{
  localStorage.setItem('ai_fitness_profile', JSON.stringify({
    gender:data.gender, age:data.age, height:data.height, weight:data.weight,
    targetWeight:data.target, deadlineDate:dl.value||null,
    goal:data.goal, illnesses:data.illness
  }));
  location.href = '/';
});

update();
</script>
</body>
</html>
